<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Remove Background - blackgate</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial; padding: 18px; }
    canvas { max-width: 100%; border: 1px solid #ddd; display:block; margin-top:10px }
    .controls { display:flex; gap:10px; align-items:center; }
  </style>
</head>
<body>
  <h3>Remove Background — blackgate.jpeg</h3>
  <div class="controls">
    <label>Threshold: <span id="val">60</span></label>
    <input id="th" type="range" min="0" max="200" value="60" />
    <button id="go">Process & Download PNG</button>
    <button id="preview">Preview Transparent</button>
  </div>
  <p>Open this file in your browser and click "Process & Download PNG" to save a transparent PNG.</p>
  <canvas id="c"></canvas>

  <script>
    const img = new Image();
    img.src = 'blackgate.jpeg';
    img.crossOrigin = 'anonymous';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const thEl = document.getElementById('th');
    const val = document.getElementById('val');

    thEl.oninput = () => val.textContent = thEl.value;

    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
    };

    function estimateBackground(data, w, h) {
      let r=0,g=0,b=0,count=0;
      // top and bottom rows
      for (let x=0;x<w;x++){
        let i = (0*w + x)*4;
        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
        i = ((h-1)*w + x)*4;
        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
      }
      // left and right columns
      for (let y=0;y<h;y++){
        let i = (y*w + 0)*4;
        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
        i = (y*w + (w-1))*4;
        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
      }
      return [Math.round(r/count), Math.round(g/count), Math.round(b/count)];
    }

    function processAndDownload() {
      if (!img.complete) return alert('Image not loaded yet');
      ctx.drawImage(img,0,0);
      const w = canvas.width, h = canvas.height;
      const imageData = ctx.getImageData(0,0,w,h);
      const data = imageData.data;
      const bg = estimateBackground(data,w,h);
      const th = Number(thEl.value);
      for (let i=0;i<data.length;i+=4){
        const dr = data[i]-bg[0];
        const dg = data[i+1]-bg[1];
        const db = data[i+2]-bg[2];
        const dist = Math.sqrt(dr*dr+dg*dg+db*db);
        if (dist < th) data[i+3] = 0; // transparent
      }
      ctx.putImageData(imageData,0,0);
      // trigger download
      canvas.toBlob(function(blob){
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'blackgate.png';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }, 'image/png');
    }

    function previewTransparent(){
      if (!img.complete) return alert('Image not loaded yet');
      ctx.drawImage(img,0,0);
      const w = canvas.width, h = canvas.height;
      const imageData = ctx.getImageData(0,0,w,h);
      const data = imageData.data;
      const bg = estimateBackground(data,w,h);
      const th = Number(thEl.value);
      for (let i=0;i<data.length;i+=4){
        const dr = data[i]-bg[0];
        const dg = data[i+1]-bg[1];
        const db = data[i+2]-bg[2];
        const dist = Math.sqrt(dr*dr+dg*dg+db*db);
        if (dist < th) data[i+3] = 0;
      }
      ctx.putImageData(imageData,0,0);
    }

    document.getElementById('go').onclick = processAndDownload;
    document.getElementById('preview').onclick = previewTransparent;
  </script>
</body>
</html>
